<div class="overlay" *ngIf="isModalOpen"></div>
<div
  class="modal-dialog"
  *ngIf="isModalOpen"
>
  <div class="modal-content">
    <div class="modal-header">
      <h5 class="modal-title">{{tituloModal}}</h5>
      <!-- modificar para que aparezcan los de usuario tambien -->
      <button type="button" class="close" (click)="closeModal()">X</button>
    </div>
    <readapp-barra-busqueda (buscarPalabra)="buscar($event)">
    </readapp-barra-busqueda>
    <div class="modal-body">
      <div
        class="contenedor-cartas"
        *ngIf="rutaActual.includes('perfil/libros_leidos')"
      >
        <readapp-card-libro
          *ngFor="let libro of libros"
          [libro]="libro"
          [esModal]="true"
          (click)="seleccionarLibro(libro)"
        >
        </readapp-card-libro>
      </div>
      <div
        class="contenedor-cartas"
        *ngIf="rutaActual.includes('perfil/libros_a_leer')"
      >
        <readapp-card-libro
          *ngFor="let libro of libros"
          [libro]="libro"
          [esModal]="true"
        >
        </readapp-card-libro>
      </div>
      <div
        class="contenedor-cartas"
        *ngIf='rutaActual.includes("/recomendacion/" + this.recomendacionNum + "/edicion")'
      >
        <readapp-card-libro
          *ngFor="let libro of libros"
          [libro]="libro"
          [esModal]="true"
          (click)="seleccionarLibro(libro)"

        >
        </readapp-card-libro>
      </div>

      <!-- <div class="contenedor-cartas" *ngIf="rutaActual.includes('perfil/amigos')">
         Aquí cargamos el componente de amigos dinámicamente 
        <ng-container *ngIf="amigoComponentLoaded">
          <ng-container *ngFor="let amigo of amigos">
            <ng-container *ngComponentOutlet="amigoComponent"></ng-container>
          </ng-container>
        </ng-container>
      </div>
     </div> -->
      
      <div class="contenedor-cartas"  *ngIf="rutaActual.includes('perfil/amigos')">
        <readapp-card-amigo *ngFor="let amigo of amigos"
        [amigo]="amigo"
        [esModal]="true">
        </readapp-card-amigo>

      </div>

      @if (noHay){
        <h1 class="noHay">No se ha encontrado lo que busca</h1>
      }

    </div>

  </div>
  <div class="boton_container">
    <button type="button" class="boton_cancelar" (click)="cancel()">
      Cancelar
    </button>
    <button type="button" class="boton_guardar" (click)="saveChanges()">
      Listo
    </button>
  </div>
</div>
