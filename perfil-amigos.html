<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Perfil de Usuario - ReadApp</title>
    <link href="./estilos.css" rel="stylesheet" />
    <link href="./header.css" rel="stylesheet" />
    <link href="./estiloPerfil.css" rel="stylesheet" />
    <link href="./estiloPerfilAmigos.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Baloo Da 2" />
    <script src="https://kit.fontawesome.com/007d112e2a.js" crossorigin="anonymous"></script>
</head>

<body>
    <header class="header">
        <div class="logo-container">
            <i class="fa-solid fa-book"></i>
            <h1>ReadApp</h1>
        </div>
        <div class="user-profile">
            <img src="imagenes\roman.jpg" class="profile-pic" />
            <span> Roman Riquelme</span>
        </div>
    </header>

    <div class="main">
        <div class="info_usuario">
            <div class="fotoPerfil">
                <img src="imagenes\roman.jpg" class="imagen_perfil" />
            </div>
            <div class="nombre_perfil">Roman Riquelme</div>
            <nav class="submenu_perfil">
                <li class="boton_menu">
                    <img class="icono" src="imagenes\info.svg" />
                    <a href="this">Informacion</a>
                </li>
                <li class="boton_menu">
                    <img class="icono" src="imagenes\amigos.svg" />
                    <a href="">Amigos</a>
                </li>
                <li class="boton_menu">
                    <img class="icono" src="imagenes\librosleidos.svg" />
                    <a href="">Libros leidos</a>
                </li>
                <li class="boton_menu">
                    <img class="icono" src="imagenes\librosaleer.svg" />
                    <a href="">Libros a leer</a>
                </li>
                <li class="boton_menu">
                    <img class="icono" src="imagenes\valorarReco.svg" />
                    <a href="">Recomendaciones a valorar</a>
                </li>

            </nav>

        </div>
        <div class="amigos_conteiner">
            <h1> Amigos</h1>
            <section class="lista_amigos">
                <div class="carta_amigo">
                    <img src="imagenes/bilardo.jpg">
                    <div class="amigo_info">
                        <div class="nombre_apellido">
                            <label><b>Nombre</b></label>
                            <label><b>Apellido</b></label>
                        </div>
                        <p>Unsername</p>
                    </div>
                    <button><img src="imagenes/trash.svg"></button>
                </div>

                <div class="carta_amigo">
                    <img src="imagenes/bilardo.jpg">
                    <div class="amigo_info">
                        <div class="nombre_apellido">
                            <label><b>Nombre</b></label>
                            <label><b>Apellido</b></label>
                        </div>
                        <p>Unsername</p>
                    </div>
                    <button><img src="imagenes/trash.svg"></button>
                </div>

                <div class="carta_amigo">
                    <img src="imagenes/bilardo.jpg">
                    <div class="amigo_info">
                        <div class="nombre_apellido">
                            <label><b>Nombre</b></label>
                            <label><b>Apellido</b></label>
                        </div>
                        <p>Unsername</p>
                    </div>
                    <button><img src="imagenes/trash.svg"></button>
                </div>

                <div class="carta_amigo">
                    <img src="imagenes/bilardo.jpg">
                    <div class="amigo_info">
                        <div class="nombre_apellido">
                            <label><b>Nombre</b></label>
                            <label><b>Apellido</b></label>
                        </div>
                        <p>Unsername</p>
                    </div>
                    <button><img src="imagenes/trash.svg"></button>
                </div>

                <div class="carta_amigo mas">
                    <div class="circulo-mas">
                        <div class="icono-mas"><button>+</button></div>
                    </div>
                </div>

            </section>

            <div class="boton_continer">

                <button class="boton_guardar" type="submit">Guardar cambios</button>
                <button class="boton_cancelar" type="submit">Cancelar</button>

            </div>

        </div>

    </div>
</body>

</html>
