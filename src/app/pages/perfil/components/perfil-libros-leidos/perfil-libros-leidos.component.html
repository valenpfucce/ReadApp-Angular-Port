                <readapp-card-libro-mas (openModalEvent)="openModal()"></readapp-card-libro-mas>

            <button class="boton_cancelar" type="submit">Cancelar</button>

        <readapp-modal *ngIf="isModalOpen" [isModalOpen]="isModalOpen" (close)="closeModal()"></readapp-modal>
