<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <title>ReadApp</title>
    <link rel="stylesheet" href="header.css" />
    <script src="https://kit.fontawesome.com/007d112e2a.js" crossorigin="anonymous"></script>
    
  </head>
  <body>
    <!--Header-->
    <header class="header">
      <div class="logo-container">
        <i class="fa-solid fa-book"></i>
        <h1>ReadApp</h1>
      </div>
      <div class="user-profile">
        <span>Roberto Carlos</span>
        <img src="user-profile.jpg" alt="Foto" class="profile-pic" />
      </div>
    </header>
    
    <!--Barra de busqueda-->
    <div class="barra-busqueda-container">
      <div class="barra-busqueda">
        <input type="text" placeholder="Buscar..." />
        <button type="submit">🔍</button>
      </div>
    </div>
  </body>
</html>
