<form>
    
    <div class="info_conteiner">
    <h1> Información</h1>
    <h2> General </h2>
  
    <section class="conteiner_datos">

      <label for="nombre">Nombre* 
        <input type="text" name="nombre" required pattern=".*\S.*" required="true" [(ngModel)]="usuarioEditable.nombre">
        <readapp-validacion-field [domainElement]="usuario" [field]="'nombre'"></readapp-validacion-field></label>
        
      <label>Apellido 
        <input type="text" name="apellido" required pattern=".*\S.*" required="true" [(ngModel)]="usuarioEditable.apellido">
        <readapp-validacion-field [domainElement]="usuario" [field]="'apellido'"></readapp-validacion-field></label>
        
      <label>Username 
        <input type="text" name="username" required pattern=".*\S.*" [(ngModel)]="usuarioEditable.username">
        <readapp-validacion-field [domainElement]="usuario" [field]="'username'"></readapp-validacion-field></label>
        
      <label>Fecha de nacimiento 
        <input type="date" name="fechaNacimiento" required pattern=".*\S.*" [(ngModel)]="fechaNacimiento"> 
        <readapp-validacion-field [domainElement]="usuario" [field]="'fecha'"></readapp-validacion-field></label>
      
      <label>Mail 
        <input type="text" name="mail" required pattern=".*\S.*" [(ngModel)]="usuarioEditable.mail">
        <readapp-validacion-field [domainElement]="usuario" [field]="'mail'"></readapp-validacion-field></label>
        
      <label>Tiempo de lectura promedio 
        <input type="text" name="tiempoLectura" required pattern=".*\S.*" [(ngModel)]="usuarioEditable.vpromedio">
        <readapp-validacion-field [domainElement]="usuario" [field]="'tiempoLectura'"></readapp-validacion-field></label>
        
    </section>

    <h2>Forma de lectura</h2>
    <div class="tipos_lectura">
      <label><input type="radio" [checked]="esPromedio" value="promedio" name="lectura" />Promedio</label>
      <label><input type="radio" [checked]="esAnsioso" value="ansioso" name="lectura" />Ansioso</label>
      <label><input type="radio" [checked]="esFanatico" value="fanatico" name="lectura" />Fanatico</label>
      <label><input type="radio" [checked]="esRecurrente" value="recurrente" name="lectura" />Recurrente</label>

    </div>
    <h2>Criterio de busqueda</h2>
    <div class="criterio_conteiner">
      <label><input type="checkbox" #precavido value="precavido" >Precavido</label>
      <label><input type="checkbox" #demandante value="demandante" >Demandante</label>
      <label><input type="checkbox" #cambiante value="cambiante" >Cambiante</label>
      <label><input type="checkbox" #leedor value="leedor">Leedor</label>
      <label><input type="checkbox" #nativista value="nativista" >Nativista</label>
      <label><input type="checkbox" #poliglota value="poliglota" >Poliglota</label>
      <label><input type="checkbox" #experimentado value="experimentado" >Experimentado</label>
      <label><input (change)="cambioCalculador()" type="checkbox" #calculador value="calculador">Calculador</label>

      
      <div class="calculador">
        <label>Maximo*<input [disabled]="!esCalculador" type="text" required pattern=".*\S.*"></label>
        <label>Minimo*<input [disabled]="!esCalculador" type="text" required pattern=".*\S.*"></label>
      </div>

    </div>

    <div *ngIf="saveOK" class="datos_guardados">
      <p>¡Los datos se guardaron correctamente!</p> 
    </div> 
    
    <div class="boton_container">
      <button class="boton_cancelar" type="submit" (click)="cancelar()">Cancelar</button>
      <button class="boton_guardar" type="submit" (click)="guardar()">Guardar cambios</button>
    </div>

    
  
  </div>

</form>
