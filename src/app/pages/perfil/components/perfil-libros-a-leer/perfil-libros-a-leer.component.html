<div class="flex perfil_container">
    <h1>Libros a leer</h1>
    <section class="flex lista_perfil">
      <section class="contenedor-cartas">
          @for (libro of librosALeer; track libro) {
            <readapp-card-libro [libro]="libro" [modo]="'edicion'" [esPerfil]="true" ></readapp-card-libro>
          }
          <readapp-card-libro-mas (openModalEvent) ="openModal()"></readapp-card-libro-mas>
      </section>
    </section>

    <div class="boton_container">
      <button (click)="cancelarCambios()" class="boton_cancelar" type="submit">Cancelar</button>
      <button (click)="guardarCambios()" class="boton_guardar" type="submit">Guardar cambios</button>
    </div>
    
    <readapp-modal *ngIf="isModalOpen" [isModalOpen]="isModalOpen" (close)="closeModal()"></readapp-modal>
</div>
