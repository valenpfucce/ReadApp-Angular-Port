<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Perfil de Usuario - ReadApp</title>
    <link href="./estilos.css" rel="stylesheet" />
    <link href="./estiloPerfilUsuario.css" rel="stylesheet" />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css?family=Baloo Da 2"
    />
    <script
    src="https://kit.fontawesome.com/007d112e2a.js"
    crossorigin="anonymous"
  ></script>
  </head>
  <body>
    <header class="header">
      <div class="logo-container">
        <i class="fa-solid fa-book"></i>
        <h1>ReadApp</h1>
      </div>
      <div class="user-profile">
        <img src="imagenes\roman.jpg" class="profile-pic" />
        <span> Roman Riquelme</span>
      </div>
    </header>

    <div class="main">
        <div class="info_usuario">
            <div class="fotoPerfil">
             <img src="imagenes\roman.jpg" class="imagen_perfil"/></div>
            <div class="nombre_perfil">Roman </div>
            <nav class="submenu_perfil">
                <div class="boton_menu">
                    <svg class="icono" xmlns="http://www.w3.org/2000/svg" shape-rendering="geometricPrecision" text-rendering="geometricPrecision" image-rendering="optimizeQuality" fill-rule="evenodd" clip-rule="evenodd" viewBox="0 0 512 512"><path fill-rule="nonzero" d="M256 0c70.69 0 134.7 28.66 181.02 74.98C483.34 121.31 512 185.31 512 256c0 70.69-28.66 134.7-74.98 181.02C390.7 483.34 326.69 512 256 512c-70.69 0-134.7-28.66-181.02-74.98C28.66 390.7 0 326.69 0 256c0-70.69 28.66-134.69 74.98-181.02C121.3 28.66 185.31 0 256 0zm17.75 342.25h29.15v29.32h-93.79v-29.32h28.76v-92.34h-28.76v-29.32h64.64v121.66zm-27.94-150.37c-7.08-.05-13.12-2.53-18.2-7.56-5.08-5.01-7.56-11.11-7.56-18.25 0-7.01 2.48-13.06 7.56-18.08 5.08-5.02 11.12-7.55 18.2-7.55 6.95 0 12.99 2.53 18.08 7.55 5.13 5.02 7.67 11.07 7.67 18.08 0 4.72-1.2 9.07-3.56 12.94-2.36 3.93-5.45 7.07-9.31 9.37-3.87 2.3-8.17 3.45-12.88 3.5zm171.9-97.59C376.33 52.92 319.15 27.32 256 27.32c-63.15 0-120.33 25.6-161.71 66.97C52.92 135.68 27.32 192.85 27.32 256c0 63.15 25.6 120.33 66.97 161.71 41.38 41.37 98.56 66.97 161.71 66.97 63.15 0 120.33-25.6 161.71-66.97 41.37-41.38 66.97-98.56 66.97-161.71 0-63.15-25.6-120.32-66.97-161.71z"/></svg> 
                    Informacion</div>
                <div>Amigos</div>
                <div>Libros leidos</div>
                <div>Libros a leer</div>
                <div>Recomendaciones a valorar</div>

            </nav>
        
        </div>
            
        
        <div class="info_conteiner">
            <h1 class="informacion"> Informacion</h1> 
            <h1 class="general"> General </h1>
            <section class="conteiner_datos"> 
                <div class="cont_1">
                    <label>Nombre</label>
                    <input type="text" class="campo_rellenar">
                    <label >Unsername</label>
                    <input type="text" class="campo_rellenar">
                    <label >Mail</label>
                    <input type="text" class="campo_rellenar">
                </div>
                <div class="cont_2">
                    <label>Apellido</label>
                    <input type="text" class="campo_rellenar">
                    <label >Fecha de nacimiento</label>
                    <input type="date" class="campo_rellenar">
                    <label >Tiempo de lectura promedio</label>
                    <input type="text" class="campo_rellenar">
                </div>
             </section>
             
         
        <h1 class="forma_lectura">Forma de lectura</h1>
            <div class="tipos_lectura">
                <label><input type="checkbox">Lector promedio</label>
                <label><input type="checkbox">Ansioso</label>
                <label><input type="checkbox">Fanatico</label>
                <label><input type="checkbox">Recurrente</label>
                
            </div>
        <h2 class="forma_lectura">Criterio de busqueda</h2>
           <div class="criterio_busqueda">
              <div class="criterio_conteiner">
                <label><input type="checkbox">Precavido</label>
                <label><input type="checkbox">Demandante</label>
                <label><input type="checkbox">Cambiante</label>
              </div>
            </div>
            <div class="criterio_busqueda">
                <div class="criterio_conteiner">
                  <label><input type="checkbox">Leedor</label>
                  <label><input type="checkbox">Nativista</label>
                </div>
            </div>
            <div class="criterio_busqueda">
                <div class="criterio_conteiner">
                  <label><input type="checkbox">Poliglota</label>
                  <label><input type="checkbox">Experimentado</label>
                  <label><input type="checkbox">Calculador</label>
                </div>
            </div>

        
        </div>
        

    </div>
  </body>
  
  </html>
