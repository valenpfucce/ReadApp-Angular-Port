<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Inicio Sesión</title>
    <link href="./estilos.css" rel="stylesheet" />
    <link href="./login.css" rel="stylesheet" />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css?family=Baloo Da 2"
    />
    <script src="https://kit.fontawesome.com/007d112e2a.js" crossorigin="anonymous"></script>
  </head>
  <body>
    <div class="card-logIn">
      <form>
        <div class="title-logIn">
          <img src="imagenes\bookk.svg"  />
          <h1> ReadApp </h1>
        </div>
        <div class="container">
          <div class="title-input">Usuario<span>*</span></div>
          <div class="container-input">
            <input type="text" id="user" /> <!--Agregar "required" para que sea un campo obligatorio-->
          </div>
          <p class="obligatorio-input"><i class="fa-solid fa-triangle-exclamation"></i> El nombre de usuario es obligatorio</p>
        </div>
        <div class="container">  
          <div class="title-input">Contraseña<span>*</span></div>
          <div class="container-input">
            <input type="password" id="password" /> <!--Agregar "required" para que sea un campo obligatorio-->
            <i class="fa-solid fa-eye"></i>
          </div>
        </div>
         <button type="submit">Ingresar</button>
        </form>
    </div>
  </body>
</html>
