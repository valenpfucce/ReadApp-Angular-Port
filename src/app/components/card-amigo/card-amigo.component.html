<article class="flex carta_amigo">
    <img src={{amigo.imgperfil}}>
    <div class="amigo_info">
      <header>{{amigo.nombre}} {{amigo.apellido }}</header>
      <h3>{{amigo.username}}</h3>
    </div>
    
    <button *ngIf="!esModal"><img src="/imagenes/trash.svg"></button>
    <button *ngIf="esModal"  >
      <div   class="circulo-mas" (click)="agregarAmigo();toggleActive()" [ngClass]="{'active': isActive}">
        <div class="icono-mas">+</div>
      </div>
    </button>
   
  

  </article>
